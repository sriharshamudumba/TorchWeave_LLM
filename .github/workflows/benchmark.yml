name: Performance Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt to benchmark"
        default: "Explain transformer attention mechanisms in detail."
      max_length:
        description: "Max token length"
        default: "200"

jobs:
  benchmark:
    name: Inference Benchmark
    runs-on: ubuntu-latest   # swap to self-hosted GPU runner for real benchmarks

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest-benchmark locust

      - name: Start services
        run: |
          docker compose up -d redis
          sleep 5

      - name: Run inference latency benchmarks
        env:
          BENCHMARK_PROMPT: ${{ github.event.inputs.prompt || 'Explain transformer attention mechanisms in detail.' }}
          BENCHMARK_MAX_LENGTH: ${{ github.event.inputs.max_length || '200' }}
          REDIS_URL: redis://localhost:6379
        run: |
          if [ -f scripts/benchmark.py ]; then
            python scripts/benchmark.py \
              --prompt "$BENCHMARK_PROMPT" \
              --max-length "$BENCHMARK_MAX_LENGTH" \
              --output benchmark-results.json
          else
            echo '{"status": "benchmark script not yet created", "note": "add scripts/benchmark.py"}' \
              > benchmark-results.json
          fi

      - name: Store benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark-results.json

      - name: Comment benchmark summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 📊 Benchmark Results\n\n';
            try {
              const data = JSON.parse(fs.readFileSync('benchmark-results.json', 'utf8'));
              body += '```json\n' + JSON.stringify(data, null, 2) + '\n```\n';
            } catch {
              body += '_Benchmark data unavailable._\n';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Tear down services
        if: always()
        run: docker compose down
