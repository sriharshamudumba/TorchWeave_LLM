name: CD – Build & Push Docker Images

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/torchweave

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Build & push each service image to GHCR
  # ─────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push – ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [server, model-manager, optimizer, ui]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────
  # Create a GitHub Release when a version tag is pushed
  # ─────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges | head -30)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$LOG"          >> $GITHUB_ENV
          echo "EOF"           >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## What's Changed
            ${{ env.CHANGELOG }}

            ## Docker Images
            Images are published to GHCR:
            ```
            ghcr.io/${{ github.repository_owner }}/torchweave-server:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/torchweave-model-manager:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/torchweave-optimizer:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/torchweave-ui:${{ github.ref_name }}
            ```
          generate_release_notes: true
