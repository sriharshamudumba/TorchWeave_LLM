name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # 1. Code Quality
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: |
          pip install black isort mypy flake8 flake8-bugbear

      - name: Check formatting (black)
        run: black --check --diff src/ || black --check --diff .

      - name: Check import ordering (isort)
        run: isort --check-only --diff src/ || isort --check-only --diff .

      - name: Lint (flake8)
        run: flake8 src/ --max-line-length=100 --extend-ignore=E203,W503 || flake8 . --max-line-length=100 --extend-ignore=E203,W503 --exclude=venv,__pycache__,.git

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports || mypy . --ignore-missing-imports --exclude venv
        continue-on-error: true   # warn-only until stubs are complete

  # ─────────────────────────────────────────────────────────────────
  # 2. Tests
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests with coverage
        env:
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: test
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=junit.xml \
            -v
        continue-on-error: true   # remove once tests/ folder is populated

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: junit.xml

  # ─────────────────────────────────────────────────────────────────
  # 3. Docker Build (validate images build cleanly)
  # ─────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all services via Docker Compose
        run: docker compose build --parallel

      - name: Validate Compose config
        run: docker compose config --quiet
