name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"   # Every Monday at 03:00 UTC

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Dependency vulnerability scan (pip-audit)
  # ─────────────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --output json --output-file audit-report.json || true
            pip-audit -r requirements.txt
          fi

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: audit-report.json

  # ─────────────────────────────────────────────────────────────────
  # Static Application Security Testing (bandit)
  # ─────────────────────────────────────────────────────────────────
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: |
          bandit -r . \
            --exclude ./venv,./tests \
            --severity-level medium \
            --format json \
            -o bandit-report.json || true
          bandit -r . \
            --exclude ./venv,./tests \
            --severity-level medium

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ─────────────────────────────────────────────────────────────────
  # Container image scanning (Trivy)
  # ─────────────────────────────────────────────────────────────────
  trivy-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build server image for scanning
        run: docker compose build server

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: torchweave_llm-server:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ─────────────────────────────────────────────────────────────────
  # Secret scanning (gitleaks)
  # ─────────────────────────────────────────────────────────────────
  gitleaks:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
