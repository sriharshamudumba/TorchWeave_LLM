name: Stale Issue & PR Management

on:
  schedule:
    - cron: "0 8 * * *"   # Daily at 08:00 UTC
  workflow_dispatch:

jobs:
  stale:
    name: Mark and Close Stale Items
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          stale-issue-message: >
            This issue has been automatically marked as stale because it has had
            no activity for **30 days**. It will be closed in 7 days unless
            further activity occurs. Thank you for your contributions!
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
            If you believe it is still relevant, please reopen it with
            additional context.
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: "stale"
          exempt-issue-labels: "pinned,security,bug,enhancement"

          # Pull Requests
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has had no activity for **14 days**. It will be closed in 7 days
            unless further activity occurs.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
            Feel free to reopen it if you'd like to continue working on it.
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: "stale"
          exempt-pr-labels: "work-in-progress,pinned"

          # Shared
          remove-stale-when-updated: true
          ascending: true
          operations-per-run: 100
